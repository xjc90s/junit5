name: Lock resolved issues

on:
  schedule:
    - cron: "39 1 * * 0"
  workflow_dispatch:

permissions: {}

concurrency:
  group: lock-resolved-issues

jobs:
  action:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      discussions: write
    steps:
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2
        with:
          process-only: issues
          log-output: true
