name: Lock resolved issues

on:
  schedule:
    - cron: "39 1 * * 0"
  workflow_dispatch:

permissions: {}

concurrency:
  group: lock-resolved-issues

jobs:
  action:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      discussions: write
    steps:
      - uses: dessant/lock-threads@851cffe46851ddd2051ea7147ebdc995113241c3 # v6.0.1
        with:
          process-only: issues
          log-output: true
